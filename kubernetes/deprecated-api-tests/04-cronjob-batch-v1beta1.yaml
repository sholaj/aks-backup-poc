# DEPRECATED: batch/v1beta1 CronJob was removed in Kubernetes 1.25
# Replacement: batch/v1
apiVersion: batch/v1beta1
kind: CronJob
metadata:
  name: deprecated-cronjob
  namespace: at-app1
  labels:
    app.kubernetes.io/part-of: aks-backup-poc
    purpose: deprecated-api-test
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cleanup
              image: busybox:1.36
              command:
                - /bin/sh
                - -c
                - echo "Running scheduled cleanup"
          restartPolicy: OnFailure
